<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="習慣トラッカー">
<meta name="theme-color" content="#1a6fd4">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>習慣トラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f7f7f5;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}
body{display:flex;flex-direction:column;max-width:600px;margin:0 auto;min-height:100dvh}
.header{background:#fff;border-bottom:1px solid #e8e8e4;padding:12px 16px 0;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-title{font-size:17px;font-weight:600;color:#1a1a18}
.today-btn{padding:8px 18px;background:#1a6fd4;border:none;border-radius:20px;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:10px 10px 0 0;font-size:13px;font-weight:500;border:1px solid transparent;border-bottom:none;cursor:pointer;white-space:nowrap;color:#888;background:transparent;transition:all .15s}
.tab.active{background:#fff;color:#1a1a18;border-color:#e8e8e4;border-bottom-color:#fff;margin-bottom:-1px;z-index:1}
.tab-add{padding:8px 12px;font-size:13px;color:#aaa;background:transparent;border:none;cursor:pointer}
.pages{flex:1;overflow:hidden}
.page{display:none;padding:14px 12px;overflow-y:auto;max-height:calc(100dvh - 90px)}
.page.active{display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.col{background:#fff;border-radius:14px;border:1px solid #e8e8e4;overflow:hidden}
.col-head{padding:10px 12px;border-bottom:1px solid #f0f0ec;display:flex;align-items:center;gap:6px;position:sticky;top:0;background:#fff;z-index:2}
.col-icon{width:28px;height:28px;border-radius:8px;background:#e8f4ee;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;cursor:pointer}
.col-title-input{font-size:16px;font-weight:400;color:#1a1a18;background:transparent;border:none;outline:none;width:100%;min-width:0}
.col-title-input::placeholder{color:#ccc}
.month-group{border-bottom:1px solid #f0f0ec}
.month-group:last-child{border-bottom:none}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#f5f5f2;cursor:pointer;user-select:none}
.month-header:active{background:#eeeeea}
.month-label{font-size:12px;font-weight:600;color:#666}
.month-label.current{color:#1a6fd4}
.month-arrow{font-size:11px;color:#aaa;transition:transform .2s}
.month-arrow.open{transform:rotate(180deg)}
.month-dates{display:none}
.month-dates.open{display:block}
.date-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #f5f5f2}
.date-row:last-child{border-bottom:none}
.date-row.today{background:#e8f0ff}
.date-row.future{opacity:0.65}
.date-info{flex:1;min-width:0}
.date-md{font-size:15px;color:#000;font-weight:400;white-space:nowrap}
.date-md.sat{color:#2255cc;font-weight:400}
.date-md.sun{color:#cc2222;font-weight:400}
.date-dow{font-size:11px;color:#bbb;margin-top:1px}
.today-badge{display:inline-block;font-size:11px;background:#1a6fd4;color:#fff;border-radius:4px;padding:2px 8px;margin-left:6px;font-weight:600;vertical-align:middle}
.check-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid #d0d0cc;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;position:relative}
.check-btn.done{background:#34c759;border-color:#34c759}
.check-btn.done::after{content:'';display:block;width:8px;height:13px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.page-name-row{display:flex;align-items:center;margin-bottom:10px;gap:8px}
.page-name-input{font-size:18px;font-weight:600;color:#333;background:transparent;border:none;outline:none;flex:1}
.del-page-btn{font-size:14px;color:#333;background:transparent;border:none;cursor:pointer;padding:4px 6px;font-weight:500}
.todo-wrap{background:#fff;border-radius:14px;border:1px solid #e8e8e4;overflow:hidden}
.todo-head{padding:12px 14px;border-bottom:1px solid #f0f0ec;background:#f0ebff;display:flex;align-items:center;gap:8px}
.todo-head-title{font-size:14px;font-weight:600;color:#3a1a6c}
.todo-add-row{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid #f5f5f2}
.todo-input{flex:1;font-size:16px;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;outline:none;background:#f9f9f8}
.todo-input:focus{border-color:#8a6fbf}
.todo-add-btn{padding:8px 14px;background:#8a6fbf;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f5f5f2}
.todo-item:last-child{border-bottom:none}
.todo-check{width:24px;height:24px;border-radius:6px;border:1.5px solid #c0b0e0;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative}
.todo-check.done{background:#8a6fbf;border-color:#8a6fbf}
.todo-check.done::after{content:'';display:block;width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.todo-text{flex:1;font-size:16px;color:#000;word-break:break-all}
.todo-text.done{color:#aaa;text-decoration:line-through}
.todo-move{font-size:18px;color:#333;background:transparent;border:none;cursor:pointer;padding:2px 4px;line-height:1}
.todo-move:active{color:#888}
.todo-del{font-size:16px;color:#333;background:transparent;border:none;cursor:pointer;padding:2px 6px}
.todo-del:active{color:#e04040}
.todo-empty{padding:24px;text-align:center;font-size:13px;color:#ccc}
.travel-wrap{background:#fff;border-radius:14px;border:1px solid #e8e8e4;overflow:hidden}
.travel-head{padding:12px 14px;border-bottom:1px solid #f0f0ec;background:#e8f4ff;display:flex;align-items:center;gap:8px}
.travel-head-title{font-size:14px;font-weight:600;color:#1a3a6c}
.travel-form{padding:12px 14px;border-bottom:1px solid #f0f0ec;display:flex;flex-direction:column;gap:8px}
.travel-row{display:flex;gap:8px;align-items:center}
.travel-label{font-size:12px;color:#888;width:56px;flex-shrink:0}
.travel-input{flex:1;font-size:15px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;outline:none;background:#f9f9f8;color:#000}
.travel-input:focus{border-color:#1a6fd4}
.travel-select{flex:1;font-size:15px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;outline:none;background:#f9f9f8;color:#000}
.travel-add-btn{width:100%;padding:10px;background:#1a6fd4;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.travel-list{}
.travel-item{padding:11px 14px;border-bottom:1px solid #f5f5f2;display:flex;align-items:flex-start;gap:10px}
.travel-item:last-child{border-bottom:none}
.travel-item-info{flex:1;min-width:0}
.travel-item-date{font-size:12px;color:#888;margin-bottom:3px}
.travel-item-route{font-size:15px;color:#000;font-weight:500;margin-bottom:2px}
.travel-item-meta{display:flex;gap:8px;align-items:center;margin-top:3px}
.travel-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.travel-badge.train{background:#e8f4ff;color:#1a6fd4}
.travel-badge.etc{background:#fff3e0;color:#e65c00}
.travel-amount{font-size:15px;font-weight:600;color:#1a1a18}
.travel-del{font-size:16px;color:#333;background:transparent;border:none;cursor:pointer;padding:2px 6px;flex-shrink:0}
.travel-del:active{color:#e04040}
.travel-empty{padding:24px;text-align:center;font-size:13px;color:#ccc}
.travel-total{padding:10px 14px;background:#f5f5f2;border-top:1px solid #e8e8e4;display:flex;justify-content:space-between;align-items:center}
.travel-total-label{font-size:13px;color:#666}
.travel-total-amount{font-size:16px;font-weight:700;color:#1a6fd4}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="header-title">習慣トラッカー</div>
    <button class="today-btn" id="today-btn">▶ 今日</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="pages" id="pages"></div>
<script>
const DAYS=['日','月','火','水','木','金','土'];
const ICONS=['🧹','🦷','💊','🏃','📚','💧','🛏️','✍️','🧘','🍳'];

function loadState(){
  try{const s=localStorage.getItem('habit_v4');if(s)return JSON.parse(s);}catch(e){}
  return {
    activePage:0,
    pages:[
      {id:'todo',name:'やること',type:'todo'},
      {id:1,name:'日課①',cols:['お風呂掃除','糸ようじ'],icons:['🧹','🦷']},
      {id:2,name:'日課②',cols:['',''],icons:['💊','🏃']},
      {id:'travel',name:'交通費',type:'travel'}
    ],
    checks:{},todos:[],openMonths:{},travels:[]
  };
}
function saveState(){try{localStorage.setItem('habit_v4',JSON.stringify(state));}catch(e){}}

function getDates(){
  const arr=[];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=-365;i<=30;i++){const d=new Date(today);d.setDate(today.getDate()+i);arr.push(d);}
  return arr;
}

function groupByMonth(dates){
  const groups={};
  dates.forEach(d=>{
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!groups[key])groups[key]=[];
    groups[key].push(d);
  });
  return groups;
}

function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function checkKey(pgId,ci,dateStr){return `${pgId}_${ci}_${dateStr}`;}

let state=loadState();
let todayEl=null;
let activePageEl=null;

function scrollToToday(smooth=true){
  if(!todayEl||!activePageEl) return;
  // 今月が閉じていたら開く
  const monthDates=todayEl.closest('.month-dates');
  if(monthDates&&!monthDates.classList.contains('open')){
    monthDates.classList.add('open');
    const arrow=monthDates.previousElementSibling?.querySelector('.month-arrow');
    if(arrow) arrow.classList.add('open');
  }
  requestAnimationFrame(()=>{
    const pageRect=activePageEl.getBoundingClientRect();
    const rowRect=todayEl.getBoundingClientRect();
    const offset=rowRect.top-pageRect.top+activePageEl.scrollTop-(activePageEl.clientHeight/2)+(rowRect.height/2);
    activePageEl.scrollTo({top:Math.max(0,offset),behavior:smooth?'smooth':'instant'});
  });
}

function renderTravelPage(){
  const div=document.createElement('div');div.className='page';
  const wrap=document.createElement('div');wrap.className='travel-wrap';

  // ヘッダー
  const head=document.createElement('div');head.className='travel-head';
  head.innerHTML='<span style="font-size:18px">🚃</span><span class="travel-head-title">交通費</span>';
  wrap.appendChild(head);

  // フォーム
  const form=document.createElement('div');form.className='travel-form';

  // 日付
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const dateRow=document.createElement('div');dateRow.className='travel-row';
  const dateLabel=document.createElement('div');dateLabel.className='travel-label';dateLabel.textContent='日付';
  const dateInp=document.createElement('input');dateInp.type='date';dateInp.className='travel-input';dateInp.value=todayStr;
  dateRow.appendChild(dateLabel);dateRow.appendChild(dateInp);form.appendChild(dateRow);

  // 出発
  const fromRow=document.createElement('div');fromRow.className='travel-row';
  const fromLabel=document.createElement('div');fromLabel.className='travel-label';fromLabel.textContent='出発';
  const fromInp=document.createElement('input');fromInp.type='text';fromInp.className='travel-input';fromInp.placeholder='出発地点';
  fromRow.appendChild(fromLabel);fromRow.appendChild(fromInp);form.appendChild(fromRow);

  // 到着
  const toRow=document.createElement('div');toRow.className='travel-row';
  const toLabel=document.createElement('div');toLabel.className='travel-label';toLabel.textContent='到着';
  const toInp=document.createElement('input');toInp.type='text';toInp.className='travel-input';toInp.placeholder='到着地点';
  toRow.appendChild(toLabel);toRow.appendChild(toInp);form.appendChild(toRow);

  // 種別
  const typeRow=document.createElement('div');typeRow.className='travel-row';
  const typeLabel=document.createElement('div');typeLabel.className='travel-label';typeLabel.textContent='種別';
  const typeSel=document.createElement('select');typeSel.className='travel-select';
  [['train','🚃 電車'],['etc','🚗 ETC']].forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;typeSel.appendChild(o);});
  typeRow.appendChild(typeLabel);typeRow.appendChild(typeSel);form.appendChild(typeRow);

  // 金額
  const amtRow=document.createElement('div');amtRow.className='travel-row';
  const amtLabel=document.createElement('div');amtLabel.className='travel-label';amtLabel.textContent='金額';
  const amtInp=document.createElement('input');amtInp.type='number';amtInp.className='travel-input';amtInp.placeholder='0';amtInp.min='0';
  amtRow.appendChild(amtLabel);amtRow.appendChild(amtInp);form.appendChild(amtRow);

  // 追加ボタン
  const addBtn=document.createElement('button');addBtn.className='travel-add-btn';addBtn.textContent='追加';
  addBtn.onclick=()=>{
    const date=dateInp.value;const from=fromInp.value.trim();const to=toInp.value.trim();
    const type=typeSel.value;const amt=parseInt(amtInp.value)||0;
    if(!from&&!to){alert('出発地点または到着地点を入力してください');return;}
    if(!state.travels)state.travels=[];
    state.travels.unshift({id:Date.now(),date,from,to,type,amount:amt});
    fromInp.value='';toInp.value='';amtInp.value='';
    saveState();renderList();
  };
  form.appendChild(addBtn);
  wrap.appendChild(form);

  // リスト
  const list=document.createElement('div');list.className='travel-list';

  // 合計
  const total=document.createElement('div');total.className='travel-total';
  const totalLabel=document.createElement('div');totalLabel.className='travel-total-label';totalLabel.textContent='合計';
  const totalAmt=document.createElement('div');totalAmt.className='travel-total-amount';
  total.appendChild(totalLabel);total.appendChild(totalAmt);

  function renderList(){
    list.innerHTML='';
    if(!state.travels||state.travels.length===0){
      list.innerHTML='<div class="travel-empty">記録がありません</div>';
      totalAmt.textContent='¥0';return;
    }
    const sum=state.travels.reduce((a,t)=>a+(t.amount||0),0);
    totalAmt.textContent='¥'+sum.toLocaleString();
    state.travels.forEach(t=>{
      const item=document.createElement('div');item.className='travel-item';
      const info=document.createElement('div');info.className='travel-item-info';
      const dateDiv=document.createElement('div');dateDiv.className='travel-item-date';
      if(t.date){const[y,m,d]=t.date.split('-');dateDiv.textContent=`${parseInt(m)}/${parseInt(d)}`;}
      const route=document.createElement('div');route.className='travel-item-route';
      route.textContent=(t.from||'—')+' → '+(t.to||'—');
      const meta=document.createElement('div');meta.className='travel-item-meta';
      const badge=document.createElement('span');badge.className='travel-badge '+(t.type||'train');
      badge.textContent=t.type==='etc'?'🚗 ETC':'🚃 電車';
      const amt=document.createElement('span');amt.className='travel-amount';
      amt.textContent='¥'+(t.amount||0).toLocaleString();
      meta.appendChild(badge);meta.appendChild(amt);
      info.appendChild(dateDiv);info.appendChild(route);info.appendChild(meta);
      const del=document.createElement('button');del.className='travel-del';del.textContent='✕';
      del.onclick=()=>{state.travels=state.travels.filter(x=>x.id!==t.id);saveState();renderList();};
      item.appendChild(info);item.appendChild(del);
      list.appendChild(item);
    });
  }

  renderList();
  wrap.appendChild(list);
  wrap.appendChild(total);
  div.appendChild(wrap);return div;
}

function renderTodoPage(){
  const div=document.createElement('div');div.className='page';
  const wrap=document.createElement('div');wrap.className='todo-wrap';
  const head=document.createElement('div');head.className='todo-head';
  head.innerHTML='<span style="font-size:18px">📝</span><span class="todo-head-title">やることリスト</span>';
  wrap.appendChild(head);
  const addRow=document.createElement('div');addRow.className='todo-add-row';
  const inp=document.createElement('input');inp.type='text';inp.className='todo-input';inp.placeholder='タスクを入力…';
  const addBtn=document.createElement('button');addBtn.className='todo-add-btn';addBtn.textContent='追加';
  addRow.appendChild(inp);addRow.appendChild(addBtn);wrap.appendChild(addRow);
  const list=document.createElement('div');list.className='todo-list';

  function renderList(){
    list.innerHTML='';
    if(!state.todos||state.todos.length===0){list.innerHTML='<div class="todo-empty">タスクがありません</div>';return;}
    state.todos.forEach(todo=>{
      const item=document.createElement('div');item.className='todo-item';
      const chk=document.createElement('button');chk.className='todo-check'+(todo.done?' done':'');
      chk.onclick=()=>{const t=state.todos.find(x=>x.id===todo.id);if(t){t.done=!t.done;saveState();renderList();}};
      const txt=document.createElement('div');txt.className='todo-text'+(todo.done?' done':'');txt.textContent=todo.text;
      const moveUp=document.createElement('button');moveUp.className='todo-move';moveUp.textContent='▲';
      moveUp.onclick=()=>{const idx=state.todos.findIndex(x=>x.id===todo.id);if(idx>0){const tmp=state.todos[idx-1];state.todos[idx-1]=state.todos[idx];state.todos[idx]=tmp;saveState();renderList();}};
      const moveDown=document.createElement('button');moveDown.className='todo-move';moveDown.textContent='▼';
      moveDown.onclick=()=>{const idx=state.todos.findIndex(x=>x.id===todo.id);if(idx<state.todos.length-1){const tmp=state.todos[idx+1];state.todos[idx+1]=state.todos[idx];state.todos[idx]=tmp;saveState();renderList();}};
      const del=document.createElement('button');del.className='todo-del';del.textContent='✕';
      del.onclick=()=>{state.todos=state.todos.filter(x=>x.id!==todo.id);saveState();renderList();};
      const moveWrap=document.createElement('div');moveWrap.style.cssText='display:flex;flex-direction:column;gap:2px;';
      moveWrap.appendChild(moveUp);moveWrap.appendChild(moveDown);
      item.appendChild(chk);item.appendChild(txt);item.appendChild(moveWrap);item.appendChild(del);
      list.appendChild(item);
    });
  }

  function addTodo(){
    const text=inp.value.trim();if(!text)return;
    if(!state.todos)state.todos=[];
    state.todos.unshift({id:Date.now(),text,done:false});
    inp.value='';saveState();renderList();
  }
  addBtn.onclick=addTodo;inp.onkeydown=e=>{if(e.key==='Enter')addTodo();};
  renderList();wrap.appendChild(list);div.appendChild(wrap);return div;
}

function renderTrackerPage(pg,pi,ai){
  const pageDiv=document.createElement('div');
  pageDiv.className='page'+(pi===ai?' active':'');

  const nameRow=document.createElement('div');nameRow.className='page-name-row';
  const nameInp=document.createElement('input');nameInp.type='text';nameInp.className='page-name-input';
  nameInp.placeholder='ページ名';nameInp.value=pg.name;
  nameInp.oninput=e=>{pg.name=e.target.value;document.querySelectorAll('.tab')[pi].textContent=e.target.value;saveState();};
  nameRow.appendChild(nameInp);

  const trackerIdxs=state.pages.map((p,i)=>p.type!=='todo'?i:-1).filter(i=>i>=0);
  const myTrackerPos=trackerIdxs.indexOf(pi);
  if(myTrackerPos>0){
    const leftBtn=document.createElement('button');leftBtn.className='del-page-btn';leftBtn.textContent='◀';
    leftBtn.onclick=()=>{const prevIdx=trackerIdxs[myTrackerPos-1];const tmp=state.pages[pi];state.pages[pi]=state.pages[prevIdx];state.pages[prevIdx]=tmp;state.activePage=prevIdx;saveState();render();};
    nameRow.appendChild(leftBtn);
  }
  if(myTrackerPos<trackerIdxs.length-1){
    const rightBtn=document.createElement('button');rightBtn.className='del-page-btn';rightBtn.textContent='▶';
    rightBtn.onclick=()=>{const nextIdx=trackerIdxs[myTrackerPos+1];const tmp=state.pages[pi];state.pages[pi]=state.pages[nextIdx];state.pages[nextIdx]=tmp;state.activePage=nextIdx;saveState();render();};
    nameRow.appendChild(rightBtn);
  }
  if(trackerIdxs.length>1){
    const delBtn=document.createElement('button');delBtn.className='del-page-btn';delBtn.textContent='削除';
    delBtn.onclick=()=>{if(!confirm(`「${pg.name}」を削除しますか？`))return;state.pages.splice(pi,1);if(state.activePage>=state.pages.length)state.activePage=state.pages.length-1;saveState();render();};
    nameRow.appendChild(delBtn);
  }
  pageDiv.appendChild(nameRow);

  const dates=getDates();
  const groups=groupByMonth(dates);
  const todayMonth=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
  const grid=document.createElement('div');grid.className='grid';

  [0,1].forEach(ci=>{
    const col=document.createElement('div');col.className='col';
    const head=document.createElement('div');head.className='col-head';
    const icon=document.createElement('div');icon.className='col-icon';
    icon.textContent=pg.icons?.[ci]||'📋';
    icon.onclick=()=>{const e=prompt('絵文字を入力:',pg.icons?.[ci]||'📋');if(e){if(!pg.icons)pg.icons=['📋','📋'];pg.icons[ci]=e.trim().slice(0,2);saveState();render();}};
    head.appendChild(icon);
    const titleInp=document.createElement('input');titleInp.type='text';titleInp.className='col-title-input';
    titleInp.placeholder='項目名…';titleInp.value=pg.cols[ci]||'';
    titleInp.oninput=e=>{pg.cols[ci]=e.target.value;saveState();};
    head.appendChild(titleInp);col.appendChild(head);

    Object.entries(groups).reverse().forEach(([monthKey,monthDates])=>{
      const isCurrent=(monthKey===todayMonth);
      const openKey=`${pg.id}_${ci}_${monthKey}`;
      if(state.openMonths[openKey]===undefined)state.openMonths[openKey]=isCurrent;
      const isOpen=state.openMonths[openKey];
      const group=document.createElement('div');group.className='month-group';
      const mhdr=document.createElement('div');mhdr.className='month-header';
      const [y,m]=monthKey.split('-');
      const mlabel=document.createElement('span');mlabel.className='month-label'+(isCurrent?' current':'');
      mlabel.textContent=`${y}年${parseInt(m)}月`;
      const marrow=document.createElement('span');marrow.className='month-arrow'+(isOpen?' open':'');marrow.textContent='▼';
      mhdr.appendChild(mlabel);mhdr.appendChild(marrow);
      const mdates=document.createElement('div');mdates.className='month-dates'+(isOpen?' open':'');
      mhdr.onclick=()=>{const nowOpen=mdates.classList.contains('open');mdates.classList.toggle('open',!nowOpen);marrow.classList.toggle('open',!nowOpen);state.openMonths[openKey]=!nowOpen;saveState();};

      [...monthDates].reverse().forEach(d=>{
        const today=new Date();today.setHours(0,0,0,0);
        const isPast=d<today;const isFuture=d>today;const isTodayFlag=isToday(d);const dow=d.getDay();
        const row=document.createElement('div');
        row.className='date-row'+(isTodayFlag?' today':isFuture?' future':'');
        if(isTodayFlag&&ci===0)todayEl=row;
        const info=document.createElement('div');info.className='date-info';
        const mdSpan=document.createElement('div');
        let mdClass='date-md';
        if(dow===6)mdClass+=' sat';
        else if(dow===0)mdClass+=' sun';
        mdSpan.className=mdClass;
        mdSpan.innerHTML=`${d.getMonth()+1}/${d.getDate()}（${DAYS[dow]}）${isTodayFlag?'<span class="today-badge">今日</span>':''}`;
        info.appendChild(mdSpan);row.appendChild(info);
        const key=checkKey(pg.id,ci,ds(d));
        const btn=document.createElement('button');btn.className='check-btn'+(state.checks[key]?' done':'');
        btn.onclick=()=>{state.checks[key]=!state.checks[key];btn.classList.toggle('done');saveState();};
        row.appendChild(btn);mdates.appendChild(row);
      });

      group.appendChild(mhdr);group.appendChild(mdates);col.appendChild(group);
    });
    grid.appendChild(col);
  });

  pageDiv.appendChild(grid);return pageDiv;
}

function render(){
  const tabsEl=document.getElementById('tabs');
  const pagesEl=document.getElementById('pages');
  tabsEl.innerHTML='';pagesEl.innerHTML='';
  todayEl=null;activePageEl=null;
  const ai=state.activePage??0;

  state.pages.forEach((pg,pi)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(pi===ai?' active':'');
    btn.textContent=pg.name||`ページ ${pi+1}`;
    btn.onclick=()=>{state.activePage=pi;saveState();render();};
    tabsEl.appendChild(btn);
  });

  const addBtn=document.createElement('button');addBtn.className='tab-add';addBtn.textContent='＋';
  addBtn.onclick=()=>{
    const id=Date.now();
    const trackerPages=state.pages.filter(p=>p.type!=='todo');
    const nextNum=trackerPages.length+1;
    const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
    const name='日課'+(nums[nextNum-1]||nextNum);
    let insertIdx=state.pages.length;
    for(let i=state.pages.length-1;i>=0;i--){if(state.pages[i].type!=='todo'){insertIdx=i+1;break;}}
    state.pages.splice(insertIdx,0,{id,name,cols:['',''],icons:[ICONS[trackerPages.length%ICONS.length],'⭐']});
    state.activePage=insertIdx;saveState();render();
  };
  tabsEl.appendChild(addBtn);

  state.pages.forEach((pg,pi)=>{
    let pageDiv;
    if(pg.type==='todo'){pageDiv=renderTodoPage();pageDiv.className='page'+(pi===ai?' active':'');}
    else if(pg.type==='travel'){pageDiv=renderTravelPage();pageDiv.className='page'+(pi===ai?' active':'');}
    else{pageDiv=renderTrackerPage(pg,pi,ai);}
    if(pi===ai)activePageEl=pageDiv;
    pagesEl.appendChild(pageDiv);
  });

  document.getElementById('today-btn').onclick=()=>scrollToToday(true);
  setTimeout(()=>scrollToToday(false),80);
}

state.activePage=state.activePage??0;
render();
</script>
</body>
</html>
